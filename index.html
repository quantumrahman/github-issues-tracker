<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title ----------------------------------- -->
    <title>GitHub Issues Tracker</title>
    <!-- favicon --------------------------------- -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font ----------------------------- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome ---------------------------- -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css ------------------------------------- -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./tailwind.config.css">
    <!-- tailwind css ---------------------------- -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-full min-h-screen bg-[#f3f6f8]">
        <!-- login start ----------------------------- -->
        <!-- login end ------------------------------- -->
    
        <!-- header start ---------------------------- -->
        <header>
            <div class="w-full py-4 bg-white border-b border-[#E9E9E9] flex items-center justify-center flex-col px-5 gap-5 md:justify-between md:px-10 lg:px-20 lg:flex-row">
                <div class="w-full md:w-auto">
                    <div class="flex items-center justify-center gap-1 md:justify-start">
                        <img src="./assets/github-logo.png" alt="logo" class="w-9 h-9">
                        <h1 class="font-geist text-xl text-[#1F2937] font-semibold md:text-2xl">GitHub Issues Tracker</h1>
                    </div>
                </div>
                <div class="w-full flex items-center justify-center gap-4 flex-col lg:w-auto lg:flex-row">
                    <div class="w-full bg-transparent border border-[#E4E4E7] rounded-sm pl-4 flex items-center gap-2 lg:max-w-[300px]">
                        <i class="fa-solid fa-magnifying-glass text-base text-[#64748B]"></i>
                        <input type="text" placeholder="Search issues..." autocomplete="off" class="w-full py-3.5 pr-4 outline-none font-geist text-base text-[#1F2937] font-normal placeholder:text-[#64748B]">
                    </div>
                    <button class="w-full py-3 px-4 bg-[#4A00FF] border border-[#4A00FF] rounded-sm space-x-1 cursor-pointer transition-colors ease-linear duration-100 hover:bg-[#4A00FF]/90 hover:border-[#4A00FF]/90 lg:max-w-[140px] lg:px-0">
                        <i class="fa-solid fa-plus text-base text-white"></i>
                        <span class="font-geist text-base text-white font-semibold">New Issue</span>
                    </button>
                </div>
            </div>
        </header>
        <!-- header end ------------------------------ -->
         
        <!-- main start ------------------------------ -->
        <main>
            <div class="w-full max-w-[1110px] mx-auto px-5 md:px-10 lg:px-20">
                <div class="w-full min-h-screen py-5 md:py-10 lg:py-[60px]">
                    <div class="w-full py-5 px-5 bg-white rounded-lg flex items-center justify-center gap-2 md:py-5 md:px-5 lg:py-6 lg:px-6 lg:justify-start">
                        <button class="w-full max-w-[120px] py-2 px-2 rounded-sm bg-white border border-[#E4E4E7] cursor-pointer font-geist text-sm text-[#64748B] font-semibold transition-colors ease-linear duration-100 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white md:py-2 md:px-3 active-tab">All</button>
                        <button class="w-full max-w-[120px] py-2 px-2 rounded-sm bg-white border border-[#E4E4E7] cursor-pointer font-geist text-sm text-[#64748B] font-semibold transition-colors ease-linear duration-100 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white md:py-2 md:px-3">Open</button>
                        <button class="w-full max-w-[120px] py-2 px-2 rounded-sm bg-white border border-[#E4E4E7] cursor-pointer font-geist text-sm text-[#64748B] font-semibold transition-colors ease-linear duration-100 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white md:py-2 md:px-3">Closed</button>
                    </div>
                    <div class="w-full min-h-[500px] mt-4 bg-[#fbfbfb] rounded-lg overflow-hidden">
                        <div class="w-full py-5 px-5 bg-white border-b border-[#E4E4E7] flex justify-between flex-col gap-4 md:py-5 md:px-5 lg:py-6 lg:px-6 sm:flex-row md:flex-row">
                            <div class="w-auto flex items-center gap-2">
                                <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center lg:w-[50px] lg:h-[50px]">
                                    <img src="./assets/aperture.png" alt="aperture icon" class="w-[30px] h-[30px] lg:w-8 lg:h-8">
                                </div>
                                <div class="space-y-0.5">
                                    <h4 class="font-geist text-base text-[#1F2937] font-semibold md:text-lg lg:text-xl"><span>00</span> Issues</h4>
                                    <p class="font-geist text-sm text-[#64748B] font-normal md:text-base">Track and manage your project issues</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-center">
                                <div class="w-auto flex flex-row gap-4">
                                    <div class="flex items-center gap-[4.5px]">
                                        <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                                        <span class="font-geist text-sm text-[#1F2937] font-medium md:text-base">Open</span>
                                    </div>
                                    <div class="flex items-center  gap-[4.5px]">
                                        <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                                        <span class="font-geist text-sm text-[#1F2937] font-medium md:text-base">Closed</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <!-- main end -------------------------------- -->
    </div>

    <!-- script ---------------------------------- -->
    <script src="./script/app.js"></script>
</body>
</html>
